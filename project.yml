name: ForgeIt
options:
  bundleIdPrefix: com.forgeit
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.10"
    PRODUCT_BUNDLE_IDENTIFIER: com.forgeit.app
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    SWIFT_EMIT_LOC_STRINGS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_TESTABILITY: YES

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Configs/Debug.xcconfig
  Release: Configs/Release.xcconfig

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

targets:
  ForgeIt:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ForgeIt
        excludes:
          - "**/*.DS_Store"
    resources:
      - path: ForgeIt/Resources
        optional: true
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_FILE: ForgeIt/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.forgeit.app
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
      configs:
        Debug:
          SUPABASE_URL: "https://dybbhxmndqnxasucrqxi.supabase.co"
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5YmJoeG1uZHFueGFzdWNycXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjY0NzYsImV4cCI6MjA4OTEwMjQ3Nn0.QVwjPtKXD5_CFBZuU_-UVuWgvYr9n0_mEGV0u-dt2kg"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SUPABASE_URL: "https://dybbhxmndqnxasucrqxi.supabase.co"
          SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR5YmJoeG1uZHFueGFzdWNycXhpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjY0NzYsImV4cCI6MjA4OTEwMjQ3Nn0.QVwjPtKXD5_CFBZuU_-UVuWgvYr9n0_mEGV0u-dt2kg"
    scheme:
      testTargets:
        - ForgeItTests

